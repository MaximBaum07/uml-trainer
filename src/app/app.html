<div class="min-h-screen bg-slate-50">
  <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
      <a routerLink="/" class="flex items-center gap-2 no-underline">
        <i class="pi pi-graduation-cap text-2xl" style="color: #3B82F6"></i>
        <span class="text-xl font-bold text-slate-800">AP2 Trainer</span>
      </a>
      <span class="text-sm text-slate-500 hidden sm:inline">Fachinformatiker Anwendungsentwicklung – Prüfungsvorbereitung</span>
      <nav class="ml-auto flex gap-2">
        <a routerLink="/"
           class="px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 no-underline transition-colors"
           routerLinkActive="!bg-blue-50 !text-blue-700"
           [routerLinkActiveOptions]="{exact: true}">
          <i class="pi pi-home mr-1"></i> Dashboard
        </a>
      </nav>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-4 py-6">
    <router-outlet />
  </main>
</div>
